name: Syntax Check

on:
  push:
  pull_request:

jobs:
  hugo-build:
    name: Hugo build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.145.0"
          extended: true

      - name: Build (strict)
        run: hugo --minify --gc --noBuildLock -e production 2>&1

  css-lint:
    name: CSS lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install stylelint
        run: npm install --save-dev stylelint stylelint-config-standard

      - name: Lint CSS
        run: npx stylelint "assets/css/**/*.css" --config '{"extends":"stylelint-config-standard","rules":{"custom-property-no-missing-var-function":true,"no-duplicate-selectors":true,"declaration-block-no-duplicate-properties":true}}'

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "content/**/*.md"
          config: |
            {
              "default": true,
              "MD013": false,
              "MD033": false,
              "MD041": false
            }

  toml-lint:
    name: TOML lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install taplo
        run: |
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz \
            | gunzip > /usr/local/bin/taplo
          chmod +x /usr/local/bin/taplo

      - name: Lint TOML
        run: taplo lint config/_default/*.toml
